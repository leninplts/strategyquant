version: "3.8"

services:
  sqx:
    # SQX solo distribuye binarios x86_64. En hosts ARM64 (Oracle Ampere A1)
    # se ejecuta vía emulación QEMU. Requiere haber registrado binfmt amd64
    # en el host una sola vez (ver notas al final del archivo).
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
      args:
        SQX_ZIP_URL: ${SQX_ZIP_URL}
    container_name: sqx
    restart: unless-stopped
    volumes:
      - sqx_user:/opt/sqx/user
      - sqx_projects:/opt/sqx/projects
      - sqx_data:/opt/sqx/data
      - sqx_logs:/opt/sqx/logs
      - sqx_config:/opt/sqx/config
    ports:
      # noVNC web UI -> abrir en navegador: http://host:8090/vnc.html
      - "8090:8090"
      # VNC nativo (opcional, cliente VNC tradicional)
      - "5901:5901"
      # API HTTP interna de SQX (opcional, para llamadas /call?cmd=...)
      - "5050:5050"
    environment:
      - TZ=America/Lima
      - SQX_LICENSE=${SQX_LICENSE}
      - VNC_PASSWORD=${VNC_PASSWORD:-changeme}
      - VNC_RESOLUTION=${VNC_RESOLUTION:-1600x900}
      - VNC_COL_DEPTH=24
    shm_size: "1gb"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5901 && nc -z localhost 8090"]
      interval: 30s
      timeout: 10s
      retries: 3
      # 5 minutos: la emulación QEMU hace que el primer arranque
      # de Electron + JRE x86 sobre ARM64 sea mucho más lento.
      start_period: 5m
    deploy:
      resources:
        limits:
          # Host: Ampere A1 con 3 oCPU + 18GB RAM dedicados a esta instancia.
          # Dejamos ~3GB libres al sistema y compartido con filebrowser.
          memory: 14G
          cpus: "2.8"
        reservations:
          memory: 2G

  # Sidecar: File Browser para descargar estrategias exportadas desde el navegador.
  # Acceso: http://host:8091  (login inicial: admin / admin -> cambialo al entrar)
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: sqx_filebrowser
    restart: unless-stopped
    ports:
      - "8091:80"
    volumes:
      # Montamos los mismos volúmenes que sqx, en solo-lectura donde tiene sentido
      - sqx_user:/srv/user
      - sqx_projects:/srv/projects
      - sqx_data:/srv/data:ro
      - sqx_logs:/srv/logs:ro
      # Config persistente de filebrowser (usuarios, settings)
      - sqx_filebrowser_cfg:/database
    environment:
      - FB_DATABASE=/database/filebrowser.db
      - FB_ROOT=/srv
    depends_on:
      - sqx

volumes:
  sqx_user:
  sqx_projects:
  sqx_data:
  sqx_logs:
  sqx_config:
  sqx_filebrowser_cfg:

# ------------------------------------------------------------
# NOTAS DE DESPLIEGUE EN HOST ARM64 (Oracle Ampere A1)
# ------------------------------------------------------------
# StrategyQuant X solo tiene build oficial para x86_64. En esta
# instancia ARM64 se ejecuta vía emulación QEMU. Antes del primer
# `docker compose up`, ejecutar UNA VEZ en el host:
#
#   sudo apt update
#   sudo apt install -y qemu-user-static binfmt-support
#   sudo docker run --privileged --rm tonistiigi/binfmt --install amd64
#
# Verificación:
#   docker run --rm --platform linux/amd64 ubuntu:22.04 uname -m
#   # debe imprimir: x86_64
#
# Tras esto, `docker compose build --no-cache && docker compose up -d`
# arrancará SQX emulado. El primer arranque tarda 1-3 min.
#
# Performance esperada: 3x-10x más lento que x86 nativo. Si la GUI
# se siente inutilizable, considera migrar a una VM Oracle x86 (E4.Flex).
# ------------------------------------------------------------
